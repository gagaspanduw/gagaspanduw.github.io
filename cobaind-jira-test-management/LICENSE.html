<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>License</title>
    <style>
      body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;background:#0b1220;color:#e6edf3;padding:24px}
      .container{max-width:900px;margin:0 auto}
      .card{background:#071225;padding:18px;border-radius:8px}
      pre{white-space:pre-wrap;word-break:break-word;color:#cbd5e1}
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card"><h1>License</h1><pre id="content">Loading…</pre></div>
    </div>
    <script>
      fetch('LICENSE').then(r => r.text()).then(txt => document.getElementById('content').innerText = txt).catch(err => document.getElementById('content').innerText = 'Error: '+err.message);
    </script>
  </body>
  </html>
