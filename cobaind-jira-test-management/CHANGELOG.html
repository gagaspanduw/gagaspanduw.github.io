<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Changelog</title>
    <style>
      body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;background:#0b1220;color:#e6edf3;padding:24px}
      .container{max-width:900px;margin:0 auto}
      .card{background:#071225;padding:18px;border-radius:8px}
      a{color:#fb923c}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="card"><h1>Changelog</h1><div id="content">Loading…</div></div>
    </div>
    <script>
      fetch('CHANGELOG.md').then(r => r.text()).then(md => document.getElementById('content').innerHTML = marked.parse(md)).catch(err => document.getElementById('content').innerText = 'Error: '+err.message);
    </script>
  </body>
  </html>
